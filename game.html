<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No, I'm not A Human</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a4a4a, #6a6a6a);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        .left-panel {
            width: 250px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-panel {
            width: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .room-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .location-info {
            color: #9e9e9e;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .time-display {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-display .date {
            font-size: 1.1em;
            color: #9e9e9e;
            margin-bottom: 5px;
        }

        .time-display .time {
            font-size: 1.8em;
            font-weight: bold;
            color: #fff;
        }

        .npc-list {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .npc-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .npc-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .npc-id {
            font-size: 0.8em;
            color: #757575;
            font-family: monospace;
        }

        .npc-name {
            font-weight: bold;
            margin: 5px 0;
        }

        .npc-location {
            font-size: 0.9em;
            color: #9e9e9e;
        }

        .npc-personality {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .event-notification {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .map-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            color: #9e9e9e;
        }

        .room-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .room-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .room-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .room-button.current {
            background: rgba(158, 158, 158, 0.3);
            border-color: #9e9e9e;
            font-weight: bold;
        }

        .chat-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #9e9e9e;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: rgba(158, 158, 158, 0.2);
            text-align: right;
            margin-left: 20%;
        }

        .ai-message {
            background: rgba(255, 255, 255, 0.1);
            margin-right: 20%;
        }

        .system-message {
            font-style: italic;
            color: #aaa;
            font-size: 0.85em;
            text-align: center;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .send-button {
            background: #9e9e9e;
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .send-button:hover {
            background: #757575;
            transform: translateY(-1px);
        }

        .current-room-indicator {
            background: rgba(158, 158, 158, 0.2);
            border: 1px solid #9e9e9e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .connection-hint {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="map-title">🗺️ Karte</div>
            <div class="current-room-indicator">
                <div>Aktueller Raum:</div>
                <div id="currentRoomName" style="font-weight: bold; margin-top: 5px;">Flur</div>
            </div>
            <div class="room-grid">
                <button class="room-button" onclick="changeRoom('hallway')" data-room="hallway">Flur</button>
                <button class="room-button" onclick="changeRoom('bathroom')" data-room="bathroom">Bad</button>
                <button class="room-button" onclick="changeRoom('livingroom1')" data-room="livingroom1">Wohnzimmer 1</button>
                <button class="room-button" onclick="changeRoom('livingroom2')" data-room="livingroom2">Wohnzimmer 2</button>
                <button class="room-button" onclick="changeRoom('bedroom')" data-room="bedroom">Schlafzimmer</button>
                <button class="room-button" onclick="changeRoom('storageroom')" data-room="storageroom">Lagerraum</button>
                <button class="room-button" onclick="changeRoom('kitchen')" data-room="kitchen">Küche</button>
                <button class="room-button" onclick="changeRoom('basement')" data-room="basement">Keller</button>
            </div>
            <div class="connection-hint">
                💡 Tipp: Die Räume sind miteinander verbunden
            </div>
            
            <div class="time-display">
                <div class="date" id="currentDate">Tag 1, Januar 2024</div>
                <div class="time" id="currentTime">00:00</div>
            </div>
            
            <div id="eventContainer"></div>
            
            <div style="margin-bottom: 20px;">
                <h3 style="color: #9e9e9e; margin-bottom: 10px;">👥 NPCs in der Nähe</h3>
                <div class="npc-list" id="npcList">
                </div>
            </div>
            
            <div style="text-align: center;">
                <button onclick="window.location.href='index.html'" style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">
                    ← Zurück zum Hauptmenü
                </button>
            </div>
        </div>

        <div class="center-panel">
            <div class="room-container">
                <div class="location-info" id="locationInfo">
                    📍 Location: Haus - Flur
                </div>
                <h2 style="margin-bottom: 15px; color: #9e9e9e;">Aktuelle Umgebung</h2>
                <div id="roomDescription" style="line-height: 1.6;">
                    Wird geladen...
                </div>
            </div>
            <div class="center-panel" style="flex: 1; display: flex; flex-direction: column;">
                <div class="chat-title">🤖 KI Assistent (Perchance AI)</div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai-message">
                        Verbindung zum Haus wird hergestellt...
                    </div>
                </div>
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Sprich mit dem Haus..." onkeypress="handleKeyPress(event)">
                    <button class="send-button" id="sendBtn" onclick="sendMessage()">Senden</button>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <h3 style="color: #9e9e9e; margin-bottom: 10px;">Status</h3>
            <p style="font-size: 0.9em; color: #ccc;">KI-Status: <span id="aiStatus" style="color: #0f0;">Verbunden (Bridge)</span></p>
        </div>
    </div>

    <script>
        // --- GLOBALE VARIABLEN & DATEN ---
        const locations = {
            'haus_flur': { name: 'Haus - Flur' },
            'haus_bad': { name: 'Haus - Bad' },
            'haus_wohnzimmer1': { name: 'Haus - Wohnzimmer 1' },
            'haus_wohnzimmer2': { name: 'Haus - Wohnzimmer 2' },
            'haus_schlafzimmer': { name: 'Haus - Schlafzimmer' },
            'haus_lagerraum': { name: 'Haus - Lagerraum' },
            'haus_kueche': { name: 'Haus - Küche' },
            'haus_keller': { name: 'Haus - Keller' },
            'haustuer_vorne': { name: 'Haustür - Vorne' }
        };

        const rooms = {
            hallway: {
                title: "Flur",
                location: 'haus_flur',
                description: "Ein langer, dunkler Flur mit knarrenden Dielen und alten Familienfotos.",
                connections: ["bathroom", "livingroom1", "bedroom", "kitchen"]
            },
            bathroom: {
                title: "Bad",
                location: 'haus_bad',
                description: "Ein feuchtes Bad mit einem tropfenden Wasserhahn und einem seltsamen Spiegel.",
                connections: ["hallway", "bedroom"]
            },
            livingroom1: {
                title: "Wohnzimmer 1",
                location: 'haus_wohnzimmer1',
                description: "Ein gemütliches Zimmer mit einem Kamin, in dem ein ewiges Feuer brennt.",
                connections: ["hallway", "livingroom2", "kitchen"]
            },
            livingroom2: {
                title: "Wohnzimmer 2",
                location: 'haus_wohnzimmer2',
                description: "Ein spiegelverkehrtes Abbild des ersten Wohnzimmers. Alles wirkt hier fremd.",
                connections: ["livingroom1", "storageroom"]
            },
            bedroom: {
                title: "Schlafzimmer",
                location: 'haus_schlafzimmer',
                description: "Ein Schlafzimmer mit einem Himmelbett. Vorhänge wehen ohne Wind.",
                connections: ["hallway", "bathroom", "storageroom"]
            },
            storageroom: {
                title: "Lagerraum",
                location: 'haus_lagerraum',
                description: "Vollgestopft mit Kisten. Man hört leises Wispern aus den Ecken.",
                connections: ["livingroom2", "bedroom", "basement"]
            },
            kitchen: {
                title: "Küche",
                location: 'haus_kueche',
                description: "Eine alte Küche. Es riecht nach Brot, obwohl niemand backt.",
                connections: ["hallway", "livingroom1", "basement"]
            },
            basement: {
                title: "Keller",
                location: 'haus_keller',
                description: "Dunkel und kalt. Eine unbekannte Maschine summt hier monoton.",
                connections: ["storageroom", "kitchen"]
            }
        };

        let npcs = [
            { id: "SJHDNBDUID", name: "Der Wächter", location: "haus_flur", personality: "Mysteriös" },
            { id: "KDMXNCB872", name: "Elena", location: "haus_wohnzimmer1", personality: "Niedlich, aber ängstlich" }
        ];

        let currentTime = { day: 1, month: "Januar", year: 2024, hour: 0, minute: 0 };
        let currentRoom = 'hallway';
        let pendingRequests = new Map();

        // --- KI BRÜCKE (COMMUNICATION) ---

        window.addEventListener("message", (event) => {
            // Wir hören auf die Antwort vom Perchance-Fenster
            if (event.data.type === "AI_RESPONSE") {
                const resolve = pendingRequests.get(event.data.requestId);
                if (resolve) {
                    resolve(event.data.text);
                    pendingRequests.delete(event.data.requestId);
                }
            } else if (event.data.type === "AI_ERROR") {
                const resolve = pendingRequests.get(event.data.requestId);
                if (resolve) {
                    resolve("Fehler: Die KI konnte nicht antworten.");
                    pendingRequests.delete(event.data.requestId);
                }
            }
        });

        async function requestAI(prompt) {
            const requestId = Date.now().toString();
            
            // Nachricht an das übergeordnete Perchance-Fenster schicken
            window.parent.postMessage({
                type: "AI_REQUEST",
                requestId: requestId,
                instruction: prompt
            }, "*");

            // Auf Antwort warten
            return new Promise((resolve) => {
                pendingRequests.set(requestId, resolve);
                // Timeout nach 30 Sekunden
                setTimeout(() => {
                    if (pendingRequests.has(requestId)) {
                        resolve("Die KI braucht zu lange zum Antworten...");
                        pendingRequests.delete(requestId);
                    }
                }, 30000);
            });
        }

        // --- GAME LOGIC ---

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = input.value.trim();
            
            if (!text || sendBtn.disabled) return;
            
            addUserMessage(text);
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;

            const room = rooms[currentRoom];
            const prompt = `Du bist die Atmosphäre eines Mystery-Hauses. 
                Aktueller Ort: ${room.title} (${room.description}). 
                NPCs hier: ${npcs.filter(n => n.location === room.location).map(n => n.name).join(", ") || "Keine"}.
                Spieler sagt: "${text}". 
                Antworte kurz (max 3 Sätze), atmosphärisch und immersiv.`;

            const aiResponse = await requestAI(prompt);
            
            addAIMessage(aiResponse);
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }

        function changeRoom(roomId) {
            if (!rooms[roomId]) return;
            currentRoom = roomId;
            const room = rooms[roomId];
            
            document.getElementById('currentRoomName').textContent = room.title;
            document.getElementById('locationInfo').textContent = `📍 Location: ${locations[room.location].name}`;
            document.getElementById('roomDescription').textContent = room.description;
            
            document.querySelectorAll('.room-button').forEach(btn => {
                btn.classList.toggle('current', btn.dataset.room === roomId);
            });
            
            updateNPCList();
            addSystemMessage(`Du betrittst: ${room.title}`);
        }

        // --- UI HELPERS ---

        function addUserMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message user-message';
            div.textContent = msg;
            appendAndScroll(div);
        }

        function addAIMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message ai-message';
            div.textContent = msg;
            appendAndScroll(div);
        }

        function addSystemMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message system-message';
            div.textContent = `— ${msg} —`;
            appendAndScroll(div);
        }

        function appendAndScroll(el) {
            const chat = document.getElementById('chatMessages');
            chat.appendChild(el);
            chat.scrollTop = chat.scrollHeight;
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        function updateNPCList() {
            const list = document.getElementById('npcList');
            const here = npcs.filter(n => n.location === rooms[currentRoom].location);
            if (here.length === 0) {
                list.innerHTML = '<div style="color: #757575; text-align: center;">Niemand hier...</div>';
                return;
            }
            list.innerHTML = here.map(n => `
                <div class="npc-item">
                    <div class="npc-id">${n.id}</div>
                    <div class="npc-name">${n.name}</div>
                    <div class="npc-personality">${n.personality}</div>
                </div>
            `).join('');
        }

        function updateTime() {
            currentTime.minute += 10;
            if (currentTime.minute >= 60) {
                currentTime.minute = 0;
                currentTime.hour++;
                if (currentTime.hour >= 24) { currentTime.hour = 0; currentTime.day++; }
            }
            document.getElementById('currentTime').textContent = `${String(currentTime.hour).padStart(2, '0')}:${String(currentTime.minute).padStart(2, '0')}`;
            document.getElementById('currentDate').textContent = `Tag ${currentTime.day}, Januar 2024`;
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            changeRoom('hallway');
            setInterval(updateTime, 5000); // Alle 5 Sek vergehen 10 Min im Spiel
        });
    </script>
</body>
</html>
