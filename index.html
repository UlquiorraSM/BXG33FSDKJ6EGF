<!DOCTYPE html>
<html>
<head>
  <title>Main Menu</title>
  <style>
    /* Hover effects are cleaner in a style block */
    button:hover {
      filter: brightness(1.2);
      transform: scale(1.05);
    }
  </style>
</head>
<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; overflow:hidden; background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://wallpapercave.com/wp/wp15839445.png'); background-size: cover; background-position: center; background-repeat: no-repeat; position:relative;">

  <!-- 
    Menu Container 
    Using flexbox to align buttons vertically without a visual "box" around them.
  -->
  <div id="menuCtn" style="display:flex; flex-direction:column; gap:20px; align-items:center;">
    
    <h1 style="color:white; margin:0 0 20px 0; text-shadow: 2px 2px 4px black;">No, I'm Not A Human</h1>
    
    <button id="continueBtn" style="width: 200px; height: 50px; display: flex; justify-content: center; align-items: center; padding: 0; font-size:18px; border:none; border-radius:8px; background-color:rgba(105, 105, 105, 0.7); color:white; cursor:pointer; transition:transform 0.1s;">Continue</button>
    
    <button id="newGameBtn" style="width: 200px; height: 50px; display: flex; justify-content: center; align-items: center; padding: 0; font-size:18px; border:none; border-radius:8px; background-color:rgba(105, 105, 105, 0.7); color:white; cursor:pointer; transition:transform 0.1s;">New Game</button>
    
    <button id="createBtn" style="width: 200px; height: 50px; display: flex; justify-content: center; align-items: center; padding: 0; font-size:18px; border:none; border-radius:8px; background-color:rgba(105, 105, 105, 0.7); color:white; cursor:pointer; transition:transform 0.1s;">Create</button>
    
    <button id="settingsBtn" style="width: 200px; height: 50px; display: flex; justify-content: center; align-items: center; padding: 0; font-size:18px; border:none; border-radius:8px; background-color:rgba(105, 105, 105, 0.7); color:white; cursor:pointer; transition:transform 0.1s;">Settings</button>
  
  </div>

  <!-- Footer text at bottom left -->
  <div style="position:absolute; bottom:10px; left:10px; color:white; font-size:12px; text-shadow: 1px 1px 2px black;">by UlquiorraSM</div>

  <script>
    // Simple logic to handle button clicks
    continueBtn.onclick = () => {
      console.log("Continue clicked");
      // Logic to load save game would go here
    };

    newGameBtn.onclick = () => {
      console.log("New Game clicked");
      // Logic to start fresh would go here
    };

    createBtn.onclick = () => {
      console.log("Create clicked");
      // Logic for character/world creation would go here
    };

    settingsBtn.onclick = () => {
      console.log("Settings clicked");
      // Logic to open settings menu would go here
    };
  </script>
</body>
</html>
